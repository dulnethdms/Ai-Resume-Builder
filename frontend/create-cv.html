<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create CV – ResumeCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="site-shell min-h-screen flex flex-col">
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur-sm">
    <nav class="max-w-6xl mx-auto flex items-center justify-between py-3 px-4">
      <a href="dashboard.html" class="text-xs text-slate-600 hover:text-slate-900">← Back</a>
      <div class="flex items-center gap-3">
        <select id="templateSelect"
          class="bg-white border border-slate-300 text-xs rounded-md px-2 py-1.5 text-slate-700">
          <option value="modern">Modern</option>
          <option value="minimal">Minimal</option>
          <option value="creative">Creative</option>
          <option value="corporate">Corporate</option>
          <option value="classic">Classic</option>
          <option value="executive">Executive</option>
        </select>
        <button id="saveBtn"
          class="px-3 py-1.5 rounded-md bg-indigo-600 text-xs font-semibold text-white shadow-sm hover:bg-indigo-500">
          Save
        </button>
        <button id="downloadPdfBtn"
          class="px-3 py-1.5 rounded-md border border-slate-300 bg-white text-xs text-slate-700 hover:border-slate-400">
          Download PDF
        </button>
      </div>
    </nav>
  </header>

  <main class="flex-1 w-full px-4 sm:px-6 lg:px-10 py-4 grid lg:grid-cols-2 gap-4">
    <!-- Wizard -->
    <section class="space-y-4 overflow-y-auto max-h-[calc(100vh-6rem)] pr-2">
      <form id="cvForm" class="space-y-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <!-- Personal details -->
        <section>
          <h2 class="text-sm font-semibold mb-2 text-slate-900">Personal details</h2>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-xs mb-1 text-slate-700">Full name</label>
              <input name="fullName" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label class="block text-xs mb-1 text-slate-700">Email</label>
              <input name="email" type="email" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label class="block text-xs mb-1 text-slate-700">Phone</label>
              <input name="phone" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label class="block text-xs mb-1 text-slate-700">Address</label>
              <input name="address" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label class="block text-xs mb-1 text-slate-700">LinkedIn</label>
              <input name="linkedin" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
            <div>
              <label class="block text-xs mb-1 text-slate-700">GitHub</label>
              <input name="github" class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
            </div>
          </div>
          <div class="mt-2">
            <label class="block text-xs mb-1 text-slate-700">Profile photo</label>
            <input id="photoInput" type="file" accept="image/*" class="text-xs" />
          </div>
        </section>

        <!-- Summary -->
        <section>
          <div class="flex items-center justify-between mb-1">
            <h2 class="text-sm font-semibold text-slate-900">Professional summary</h2>
            <button type="button" id="aiSummaryBtn"
              class="text-[10px] px-2 py-1 rounded-md border border-slate-300 bg-white text-slate-700 hover:border-slate-400">
              AI suggest
            </button>
          </div>
          <textarea name="summary" rows="4"
            class="w-full rounded-md border border-slate-300 bg-white px-2 py-1.5 text-xs text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100"></textarea>
        </section>

        <!-- Education, Experience, Projects, Skills, Certifications -->
        <!-- Each section will have dynamic add/remove buttons handled by JS -->
        <section id="educationSection"></section>
        <section id="experienceSection"></section>
        <section id="projectsSection"></section>
        <section id="skillsSection"></section>
        <section id="certSection"></section>
      </form>
    </section>

    <!-- Live preview -->
    <section class="rounded-2xl border border-slate-200 bg-white p-4 overflow-y-auto max-h-[calc(100vh-6rem)] shadow-sm">
      <article id="previewContainer" class="bg-slate-50 text-slate-900 rounded-xl p-6 text-xs border border-slate-200">
        <!-- Rendered by preview.js / templates.js -->
      </article>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/templates.js"></script>
  <script src="assets/js/cv-editor.js"></script>
  <script src="assets/js/preview.js"></script>
</body>
</html>
