<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - ResumeCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="site-shell min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-10 py-10">
  <main class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-8 shadow-[0_20px_60px_rgba(15,23,42,0.08)]">
    <header class="mb-4">
      <p class="inline-flex items-center rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 mb-3">Secure login</p>
      <h1 class="text-2xl font-semibold text-slate-900">Welcome back</h1>
      <p class="text-sm text-slate-600 mt-1">Log in to access your resumes and dashboard.</p>
    </header>

    <form id="loginForm" class="space-y-4">
      <section>
        <label class="block text-xs font-medium text-slate-700 mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" required
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
      </section>
      <section>
        <label class="block text-xs font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
      </section>
      <button
        class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500"
        type="submit">
        Login
      </button>
      <p id="loginError" class="text-xs text-red-600 hidden"></p>
    </form>

    <footer class="mt-4 text-xs text-slate-600">
      Don’t have an account?
      <a href="signup.html" class="text-indigo-600 hover:text-indigo-500">Sign up</a>
    </footer>
  </main>

  <script src="assets/js/auth.js"></script>
</body>
</html>
