<!-- frontend/dashboard.html (core layout) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard – Resumee</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="site-shell min-h-screen flex flex-col">
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur-sm">
    <nav class="max-w-6xl mx-auto flex items-center justify-between py-3 px-4">
      <a href="index.html" class="text-sm font-semibold text-slate-900 hover:text-slate-700">Resumee</a>
      <div class="flex items-center gap-3">
        
        <button id="logoutBtn" class="text-xs text-rose-600 hover:text-rose-700">Logout</button>
      </div>
    </nav>
  </header>

  <main class="flex-1 w-full px-4 sm:px-6 lg:px-10 py-6">
    <section class="flex items-center justify-between mb-4">
      <article>
        <h2 class="text-lg font-semibold text-slate-900">Your resumes</h2>
        <p class="text-xs text-slate-600">Create, edit, duplicate, or delete your CVs.</p>
      </article>
      <button id="createResumeBtn"
        class="px-4 py-2 rounded-md bg-indigo-600 text-xs font-semibold text-white shadow-sm hover:bg-indigo-500">
        + New resume
      </button>
    </section>

    <section id="resumeList" class="grid md:grid-cols-3 gap-4">
      <!-- Cards injected by dashboard.js -->
    </section>
  </main>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
