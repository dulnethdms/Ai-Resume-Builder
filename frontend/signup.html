<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up - ResumeCraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="site-shell min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-10 py-10">
  <main class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-8 shadow-[0_20px_60px_rgba(15,23,42,0.08)]">
    <header class="mb-4">
      <p class="inline-flex items-center rounded-full bg-indigo-50 px-3 py-1 text-xs font-semibold text-indigo-700 mb-3">Create your account</p>
      <h1 class="text-2xl font-semibold text-slate-900">Start building faster</h1>
      <p class="text-sm text-slate-600 mt-1">Sign up to start building resumes.</p>
    </header>

    <form id="signupForm" class="space-y-4">
      <section>
        <label class="block text-xs font-medium text-slate-700 mb-1" for="name">Name</label>
        <input id="name" name="name" type="text" required
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
      </section>
      <section>
        <label class="block text-xs font-medium text-slate-700 mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" required
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
      </section>
      <section>
        <label class="block text-xs font-medium text-slate-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required
          class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2.5 text-sm text-slate-900 placeholder-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100" />
      </section>
      <button
        class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500"
        type="submit">
        Create account
      </button>
      <p id="signupMessage" class="text-xs hidden"></p>
    </form>

    <footer class="mt-4 text-xs text-slate-600">
      Already have an account?
      <a href="login.html" class="text-indigo-600 hover:text-indigo-500">Log in</a>
    </footer>
  </main>

  <script>
    const resolveApiBase = () => {
      if (window.API_BASE) return window.API_BASE;

      const storedApiBase = localStorage.getItem("API_BASE");
      if (storedApiBase) return storedApiBase;

      const { hostname, origin } = window.location;
      const isLocalHost = hostname === "localhost" || hostname === "127.0.0.1";

      if (isLocalHost) {
        return `http://${hostname}:5000/api`;
      }

      return `${origin}/api`;
    };

    const API_BASE = resolveApiBase();

    const signupForm = document.getElementById("signupForm");
    const signupMessage = document.getElementById("signupMessage");

    signupForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      signupMessage.classList.add("hidden");

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch(`${API_BASE}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password }),
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.message || "Signup failed");
        }

        signupMessage.textContent = "Signup successful. Redirecting to login...";
        signupMessage.className = "text-xs text-emerald-400";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      } catch (error) {
        signupMessage.textContent = error.message || "Signup failed";
        signupMessage.className = "text-xs text-red-400";
      }
    });
  </script>
</body>
</html>
